# https://mise.jdx.dev/configuration.html
[tools]
lefthook = "2.1.9"
node = "26.3.0"
oxfmt = "0.53.0"
"npm:renovate" = "43.210.2"
shellcheck = "0.11.0"
zizmor = "1.25.2"

[tasks.gen]
description = "Regenerate default.json from the preset directories"
run = "node scripts/gen-default.mjs"

[tasks."lint"]
description = "Check JSON/JSON5, YAML, Markdown, and shell formatting"
run = [
  "oxfmt --check .",
  "git ls-files -co --exclude-standard '*.sh' | xargs -r shellcheck",
]

[tasks.validate]
description = "Validate Renovate presets against the schema"
run = "renovate-config-validator --strict"

[hooks]
postinstall = "lefthook install"
